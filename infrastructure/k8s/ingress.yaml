apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main
  namespace: si-contract
  labels:
    app.kubernetes.io/name: main
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: si-contract
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-northeast-2:264594923212:certificate/977a1097-14dd-482f-ada0-f746d8a40563"
    alb.ingress.kubernetes.io/ssl-redirect: "443"
spec:
  rules:
    - host: si.rayhli.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: si-api.rayhli.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8001
